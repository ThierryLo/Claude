name: Build Windows App

on:
  workflow_dispatch:  # lets you trigger it manually with a button on GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Yarn via Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Build Windows app
        run: yarn package:win-x64

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: Zettlr-Windows
          path: out/Zettlr-win32-x64/
          retention-days: 7
